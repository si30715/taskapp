<!DOCTYPE html>
<html>
<head>

<title>Todo App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">






<style>
body {
    font-family: 'Fredoka','M PLUS Rounded 1c';
    background: #fff0f5;
}


h2 {
    font-weight: 700;
    font-size: 50px;
    letter-spacing: 0.2px;
    color: #dc87ed;
}

h2 {
    text-shadow: 1px 1px 0px reba;
}


/*スタートボタンデザ*/
.start-button {
       background: #ff4fa3;
       color: white;
       font-weight: bold;
       padding: 3px 7px;
       font-size: 50px;
       border-radius: 10px;
       border: none;
       box-shadow: 0 10px 15px rgba(0,0,0,0.1);
}

/* 共通画面 */
.screen {
    display: none;
    flex-direction: column;
    align-items: center;
    padding-top: 60px;
}

.active {
    display: flex;
}

/* カード *//*大きいカード（todoとかの）*/


.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    width: 85%;
    max-width: 400px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/*ホバーでぷくっと浮くやつ*/
.card, li {
    transition: all 0.2s ease;
}

.card:hover, li:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}
/* 入力 */
input:not(.newlist-input){
    width: 40%;
    padding: 12px;
    font-size: 20px;
    border-radius: 10px;
    border: 3px solid #ccc;
    height: 20px;
}

/*全部のボタンに適応する*/
button {
    font-weight: 900;
    letter-spacing: 0.3px;
    font-family: 'Fredoka','M PLUS Rounded 1c';
    padding: 15px;
}

li span{
  font-size: 25px;
}

/* ボタン */
button:not(.newlist-btn,.start-button,.shopping-btn,.todo-btn,.deletelist-btn,.custom-list-btn,.back-btn,.add-btn,.create-btn,.input-row,.check-btn) {
    padding: 3px 6px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: #ff4fa3;
    color: white;
    width: 35%;
    font-size: 40px;
　　
}

.check-btn{
    font-size: 20px;
    background: #a49bf2;
    border: none;
    color: white;
    padding: 3px 5px;
    border-radius: 10px;
    width: auto;
}     

/*newlist ボタンのデザイン*/
.newlist-btn {
    background: pink;
    font-weight: 700;
    font-size: 25px;
    color: white;
    padding: 5px 8px;
    border-radius: 10px;
    width: 50%;
    border: none;
    margin: 3px;
    margin-top: 20px;
    white-space: nowrap;
    
}
/*newlistで追加したリストのデザ*/
.custom-list-btn {
       padding: 10px 20px;
       background:#f57aa7;
       color: white;
       border-radius: 10px;
       border: none;
       
      
/*文字の長さで枠が決まるやつ*/
       width: auto;
       display: inline-block;

       margin: 5px;
       font-size: 20px;



}
.newlist-input{
      width: 50%;
      font-size: 20px;
      padding: 12px;
      border-radius: 10px;
      border: 3px solid #ccc;
      height: 20px;
} 


.create-btn{
      background: #f78ddb;
      color: white;
      font-size: 30px;
      width: auto;
      padding: 3px;      

      border: none;
      border-radius: 10px;
      height: 50px;

      
}
.input-row{
      display: flex;
      align-items: center;
      gap: 10px;
}

/*ニューリストを消すボタン*/
.deletelist-btn {
       font-size: 13px;
      color: gray;
      width: 30%;
      background: pink;
      border-radius: 10px;
      border: none;
      
}

.list-header{
     display: flex;
     align-items: center;
     justify-content: space-between;
     gap: 10px;

}
.todo-btn{
     width: 55%;
     padding: 3px 6px;
     background: #ff4fa3;
     color: white;
     border: none;
     margin: 5px;
     border-radius: 10px;
     font-size: 45px;
   
}

.shopping-btn {
      width: 55%;
      padding: 3px 6px;
      background: #ff4fa3;
      color: white;
      border: none;
      margin: 5px;
      border-radius: 10px;
      font-size: 40px;
      
}

 

/*戻るボタンのデザ*/
.back-btn {
    background: #f78ddb;
    color: white;
    font-size: 14px;
    width: 65px;
    border: none;
    padding: 10px 10px;
    border-radius: 10px;

}

.add-btn{
    background: #ff4fa3;
    color: white;
    border-radius: 10px;
    border: none;
    font-size: 35px;
    padding: 5px 10px;
    
    width: auto;
    display: inline-block;
}

li {/*タスク一個一個カードにする*/
    list-style: none;
    background: white;
    margin: 10px 0;
    padding: 15px;
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;

    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

</style>
</head>


<!-- back trash bottom todo -->

<body>


<!-- スタート -->
<div id="welcome" class="screen active">
    <button class="start-button" onclick="showScreen('menu')">START</button>
</div>



<!-- メニューにプラスボタン追加したメニュー画面-->
<div id="menu" class="screen">
    <div class="card">
        <h2>Menu</h2>

        <button class="todo-btn" onclick="showScreen('todo')">Todo</button>
        <button class="shopping-btn" onclick="showScreen('shopping')">Shopping</button>
　　　　　
        <!--newlistボタン-->
       <button class="newlist-btn" onclick="toggleInput()">＋ New List</button>

        <div id="inputArea" class="input-row" style="display:none;">
            <input id="newListInput" class="newlist-input" placeholder="ENTER LIST NAME:)"onkeydown="handleEnter(event)">
            <button class="create-btn" onclick="createList()">CREATE</button>
        </div>

        

        <!-- ここに追加される -->
        <div id="customLists"></div>
    
       </div>
</div>

<!-- TODO -->
<div id="todo" class="screen">
    <div class="card">
        
     <button class="back-btn" onclick="showScreen('menu')">BACK</button>       

        <h2>Todo</h2>
        <input id="taskInput" onkeydown="handleTodoEnter(event)">
        <button class="add-btn" onclick="addTask()">ADD</button>
       
        <ul id="taskList"></ul>
    </div>
</div>

<!-- SHOP -->
<div id="shopping" class="screen">
    <div class="card">
        
        <button class="back-btn" onclick="showScreen('menu')">BACK</button>

        <h2>Shopping</h2>
        <input id="shopInput" onkeydown="handleShoppingEnter(event)">
        <button class="add-btn" onclick="addShop()">ADD</button>
        <ul id="shopList"></ul>
    </div>
</div>



<script>


/* 画面切り替え */
function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if(id === "todo") loadTasks();
    if(id === "shopping") loadShop();
    if(id === "trashTodo") loadTrash("todo");
    if(id === "trashShop") loadTrash("shop");
}

function toggleInput() {
    const area = document.getElementById("inputArea");

    if(area.style.display === "none") {
        area.style.display = "block";
    } else {
        area.style.display = "none";
    }
}


/* ===== TODO ===== */
function addTask() {
    const val = document.getElementById("taskInput").value;
    if(!val) return;
    addTaskToList(val);
    saveTasks();
    document.getElementById("taskInput").value = "";
}


function addTaskToList(text) {
    const li = document.createElement("li");

    const span = document.createElement("span");
    span.textContent = text;

    // ダブルタップ編集
    let clickCount = 0;
    let clickTimer = null;

    span.onclick = () => {
        clickCount++;

        if (clickCount === 1) {
            clickTimer = setTimeout(() => {
                clickCount = 0;
            }, 300);
        } else if (clickCount === 2) {
            clearTimeout(clickTimer);
            clickCount = 0;

            const inputEdit = document.createElement("input");
            inputEdit.value = span.textContent;

            span.style.display = "none";
            li.insertBefore(inputEdit, btn);

            inputEdit.focus();

            inputEdit.onblur = () => {
                if (inputEdit.value.trim() !== "") {
                    span.textContent = inputEdit.value;
                }
                span.style.display = "inline";
                inputEdit.remove();
                saveTasks();
            };

            inputEdit.onkeydown = (e) => {
                if (e.key === "Enter") inputEdit.blur();
            };
        }
    };

    const btn = document.createElement("button");
    btn.textContent = "✔️";
    btn.classList.add("check-btn");

    btn.onclick = () => {
        li.remove();
        saveTasks();
    };

    li.appendChild(span);
    li.appendChild(btn);

    document.getElementById("taskList").appendChild(li);
}


function saveTasks() {
    const arr = [...taskList.children].map(li =>
        li.querySelector("span").textContent
    );
    localStorage.setItem("tasks", JSON.stringify(arr));
}

function loadTasks() {
    taskList.innerHTML = "";
    (JSON.parse(localStorage.getItem("tasks")) || [])
        .forEach(addTaskToList);
}

function handleTodoEnter(e){
     if(e.key==="Enter") addTast();
}
    

/* ===== SHOP ===== */
function addShop() {
    const val = shopInput.value;
    if(!val) return;
    addShopToList(val);
    saveShop();
    shopInput.value="";
}

function addShopToList(text) {
    const li = document.createElement("li");

    const span = document.createElement("span");
    span.textContent = text;

    // ダブルタップ編集
    let clickCount = 0;
    let clickTimer = null;

    span.onclick = () => {
        clickCount++;

        if (clickCount === 1) {
            clickTimer = setTimeout(() => {
                clickCount = 0;
            }, 300);
        } else if (clickCount === 2) {
            clearTimeout(clickTimer);
            clickCount = 0;

            const inputEdit = document.createElement("input");
            inputEdit.value = span.textContent;

            span.style.display = "none";
            li.insertBefore(inputEdit, btn);
            inputEdit.focus();

            inputEdit.onblur = () => {
                if (inputEdit.value.trim() !== "") {
                    span.textContent = inputEdit.value;
                }
                span.style.display = "inline";
                inputEdit.remove();
                saveShop();
            };

            inputEdit.onkeydown = (e) => {
                if (e.key === "Enter") inputEdit.blur();
            };
        }
    };

    const btn = document.createElement("button");
    btn.textContent = "✔️";
    btn.classList.add("check-btn");

    btn.onclick = () => {
        li.remove();
        saveShop();
    };

    li.appendChild(span);
    li.appendChild(btn);

    document.getElementById("shopList").appendChild(li);
}


function saveShop() {
    const arr = [...shopList.children].map(li =>
        li.querySelector("span").textContent
    );
    localStorage.setItem("shops", JSON.stringify(arr));
}

function loadShop() {
    shopList.innerHTML = "";
    (JSON.parse(localStorage.getItem("shops")) || [])
        .forEach(addShopToList);
}
function handleShopingEnter(e){
   if(e.key==="Enter") addTask("shopping");
}




window.onload = function() {

    renderCustomLists();

    document.getElementById("taskInput").addEventListener("keypress", function(e){
        if(e.key === "Enter") addTask();
    });

    document.getElementById("shopInput").addEventListener("keypress", function(e){
        if(e.key === "Enter") addShop();
    });

};

function handleEnter(e){
     if(e.key==="Enter"){
      createList();
 }
}

function createList() {
    const input = document.getElementById("newListInput");
    const name = input.value;

        if(!name) return;
    
    let lists = JSON.parse(localStorage.getItem("customLists")) || [];
    lists.push(name);

    localStorage.setItem("customLists", JSON.stringify(lists));

    renderCustomLists();

    input.value = "";

    // 入力欄閉じる
    document.getElementById("inputArea").style.display = "none";
}

function renderCustomLists() {
    const container = document.getElementById("customLists");
    container.innerHTML = "";

    const lists = JSON.parse(localStorage.getItem("customLists")) || [];

    lists.forEach(name => {
        const btn = document.createElement("button");
         


btn.textContent = name;
        btn.classList.add("custom-list-btn");

        btn.onclick = () => openCustomList(name);

        container.appendChild(btn);
    });
}
function openCustomList(name) {
    // 画面全部消す
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));

    // 新しい画面作る
    let screen = document.getElementById(name);

    if(!screen){
        screen = document.createElement("div");
        screen.id = name;
        screen.className = "screen active";

               screen.innerHTML = `
           <div class="card">
                <button class="back-btn" onclick="showScreen('menu')">Back</button>
                
               <div class="list-header">
                <h2>${name}</h2>

                <button class="deletelist-btn" onclick="deleteList('${name}')">DELETE YOUR LIST</button>
</div>        
                <input id="${name}Input" >
                <button class="add-btn" onclick="addCustomTask('${name}')">ADD</button>
                <ul id="${name}List"></ul>
    </div>
`;
        document.body.appendChild(screen);
    }

    screen.classList.add("active");

    loadCustomTasks(name);
}

function deleteList(name) {
    // localStorageから削除
    localStorage.removeItem(name);

    // リスト一覧から削除
    let lists = JSON.parse(localStorage.getItem("customLists")) || [];
    lists = lists.filter(n => n !== name);
    localStorage.setItem("customLists", JSON.stringify(lists));

    // 画面削除
    document.getElementById(name)?.remove();

    showScreen("menu");
    renderCustomLists();
}

function addCustomTask(name) {
    const input = document.getElementById(name + "Input");
    const text = input.value;

    if(!text) return;

    const list = document.getElementById(name + "List");

    const li = document.createElement("li");

    const span = document.createElement("span");
    span.textContent = text;

    let clickCount = 0;
    let clickTimer = null;

    span.onclick = () => {
        clickCount++;

        if (clickCount === 1) {
            clickTimer = setTimeout(() => {
                clickCount = 0;
            }, 300);
        } else if (clickCount === 2) {
            clearTimeout(clickTimer);
            clickCount = 0;

            const inputEdit = document.createElement("input");
            inputEdit.value = span.textContent;

            li.replaceChild(inputEdit, span);
            inputEdit.focus();

            inputEdit.onblur = () => {
                span.textContent = inputEdit.value || span.textContent;
                li.replaceChild(span, inputEdit);
                saveCustomTasks(name);
            };

            inputEdit.onkeydown = (e) => {
                if (e.key === "Enter") {
                    inputEdit.blur();
                }
            };
        }
    };

    const btn = document.createElement("button");
    btn.textContent = "✔️";
    btn.classList.add("check-btn");

   
    btn.onclick = () => {
        li.remove();
        saveCustomTasks(name);
    };

    li.appendChild(span);
    li.appendChild(btn);

    list.appendChild(li);

    saveCustomTasks(name);

    input.value = ""; 
}

function saveCustomTasks(name) {
    const list = document.getElementById(name + "List");

const arr = [...list.children].map(li =>
    li.querySelector("span").textContent
);
    localStorage.setItem(name, JSON.stringify(arr));
}

function loadCustomTasks(name) {

    const arr = JSON.parse(localStorage.getItem(name)) || [];

    arr.forEach(text => {

        span.textContent = text;

        };

};

</script>
